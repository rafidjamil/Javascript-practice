<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors - Full Screen</title>

  <style>
    /* RESET & FULL SCREEN BASE */
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1e1b4b, #0f172a);
      overflow: hidden; /* Scrollbars gayab karne ke liye */
      padding: 20px;
    }

    /* CONTAINER TAKING 100% AVAILABLE SPACE */
    .container {
      width: 100%;
      height: 100%;
      max-width: 1400px; /* Badi screens par bohot zyada stretch na ho */
      max-height: 900px; /* Layout maintain rakhne ke liye */
      background: rgba(255, 255, 255, 0.02);
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);

      /* Flexbox layout to distribute space vertically */
      display: flex;
      flex-direction: column;
      justify-content: space-between; 
      align-items: center;
    }

    /* HEADER */
    .heading {
      text-align: center;
      color: #fff;
      font-size: clamp(32px, 4vw, 46px); /* Responsive font size */
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* BATTLE GROUND (STRETCHED) */
    .top-section {
      width: 100%;
      display: flex;
      gap: 40px;
      justify-content: center;
      align-items: center;
      flex: 1; /* Yeh bachi hui sari vertical space le lega */
      margin: 20px 0;
      position: relative;
    }

    /* Middle "VS" Badge */
    .top-section::after {
      content: "VS";
      position: absolute;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      background: #2563eb;
      padding: 12px 16px;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
      z-index: 2;
    }

    .player-box {
      flex: 1;
      height: 100%;
      max-height: 400px; /* Bohot zyada lamba na ho */
      background: rgba(255, 255, 255, 0.02);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.4s ease;
    }

    .player-box.winner-glow {
      border-color: #38bdf8;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.25), inset 0 0 20px rgba(56, 189, 248, 0.15);
    }

    .player-box img {
      width: clamp(100px, 12vw, 180px); /* Screen ke mutabiq image size change hoga */
      height: clamp(100px, 12vw, 180px);
      object-fit: contain;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
    }

    .player-name {
      margin-top: 25px;
      color: #94a3b8;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* SELECTION ZONE */
    .choices-container {
      width: 100%;
      text-align: center;
      margin-bottom: 20px;
    }

    .choices-title {
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 15px;
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .choice {
      width: clamp(80px, 8vw, 110px);
      height: clamp(80px, 8vw, 110px);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .choice img {
      width: 83%;
    height: 84%;
      object-fit: contain;
    }

    .choice:hover {
      transform: translateY(-10px);
      background: #2563eb;
      border-color: #60a5fa;
      box-shadow: 0 15px 30px rgba(37, 99, 235, 0.5);
    }

    /* BOTTOM SCORE & STATUS SECTION */
    .result-section {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 25px;
    }

    .result {
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 800;
      color: #38bdf8;
      text-align: left;
      flex: 1;
    }

    .result.win { color: #4ade80; }
    .result.lose { color: #f87171; }

    .score-board {
      display: flex;
      gap: 20px;
    }

    .score-card {
      min-width: 140px;
      padding: 15px 25px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .score-card h2 {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 5px;
    }

    .score-card p {
      font-size: 32px;
      font-weight: 800;
      color: #fff;
    }

    /* RESPONSIVE DESIGN FOR MOBILE SCREENS */
    @media(max-width: 768px){
      body { padding: 10px; }
      .container { padding: 20px; }
      
      .top-section {
        flex-direction: column;
        gap: 15px;
      }
      
      .top-section::after {
        font-size: 16px;
        padding: 6px 10px;
      }

      .player-box {
        width: 100%;
        max-height: 150px;
      }

      .player-name { margin-top: 10px; font-size: 14px; }
      .choices-container { margin-bottom: 10px; }
      .choice { gap: 15px; }

      .result-section {
        flex-direction: column;
        gap: 20px;
        text-align: center;
        padding-top: 15px;
      }

      .result { text-align: center; }
      .score-board { width: 100%; justify-content: center; }
      .score-card { flex: 1; }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="heading">
      Rock Paper Scissors
    </div>

    <div class="top-section">
      <div class="player-box winner-glow"  id="user-name">
       
        <div class="player-name">User</div>
      </div>

      <div class="player-box winner-glow" id="computer-name">
        
        <div class="player-name">Computer</div>
      </div>
    </div>

    <div class="choices-container">
      <div class="choices-title">Choose your weapon</div>
      <div class="choices">
        <!-- <div class="choice" title="Rock" id="rock-choice"><img src="images/rock.png" alt="Rock"></div>
        <div class="choice" title="Paper" id="paper-choice"><img src="images/paper.png" alt="Paper"></div>
        <div class="choice" title="Scissors" id="scissors-choice"><img src="images/scissor.png" alt="Scissors"></div> -->
         <div class="choice" title="Rock" id="rock-choice" onclick="playGame('images/rock.png')"><img src="images/rock.png" alt="Rock"></div>
        <div class="choice" title="Paper" id="paper-choice" onclick="playGame('images/paper.png')"><img src="images/paper.png" alt="Paper"></div>
        <div class="choice" title="Scissors" id="scissors-choice" onclick="playGame('images/scissor.png')"><img src="images/scissor.png" alt="Scissors"></div>
      </div>
    </div>

    <div class="result-section">
      <div class="result win" id="msg-id">
        let's play!
      </div>

      <div class="score-board">
        <div class="score-card">
          <h2>You</h2>
          <p id="user-score">0</p>
        </div>
        <div class="score-card">
          <h2>Computer</h2>
          <p id="computer-score">0</p>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
